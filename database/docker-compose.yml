# Postgres de DESENVOLVIMENTO/TESTE — local, descartável.
# NÃO é produção (produção = Neon). Credenciais aqui são de teste, sem segredo.
#
#   docker compose -f database/docker-compose.yml up -d
#   docker compose -f database/docker-compose.yml down        (para)
#   docker compose -f database/docker-compose.yml down -v     (apaga o volume)
#
# Conexão: postgresql://pulso:pulso_dev@localhost:5433/pulso_urbano
services:
  db:
    image: postgres:16-alpine
    container_name: pulso-urbano-db-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulso
      POSTGRES_PASSWORD: pulso_dev
      POSTGRES_DB: pulso_urbano
    ports:
      - "5433:5432"        # 5433 no host p/ não colidir com um Postgres local
    volumes:
      - pulso_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulso -d pulso_urbano"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pulso_pgdata:
